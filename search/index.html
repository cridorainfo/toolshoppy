<script>
(function () {
  var params = new URLSearchParams(location.search);
  var q = params.get('q') || params.get('query') || '';
  var dest = '/';
  if (q && globalThis.TSTrendsSEO) {
    var match = TSTrendsSEO.resolveQuery(q);
    if (match && match.href) dest = match.href;
    else dest = '/?q=' + encodeURIComponent(q);
  }
  location.replace(dest);
})();
</script>
