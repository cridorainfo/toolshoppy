<main class="tool-page container">
  <nav class="breadcrumb"><a href="/">Home</a> › <a href="/#video">Video</a> › <span class="crumb-current">Video Trimmer</span></nav>
  <div class="tool-header">
    <div class="icon-tile icon-tile--lg icon-tile--pink"><svg class="icon-svg" width="24" height="24" aria-hidden="true"><use href="/assets/icons/sprite.svg#scissors"></use></svg></div>
    <h1>Video Trimmer</h1>

        <div class="dz-cta">Select video</div>

        <video id="preview" controls style="width:100%;border-radius:var(--radius-sm);margin-bottom:12px;"></video>
        <div class="calc-row">
          <div class="calc-field"><label for="startSec">Start (sec)</label><input type="number" id="startSec" value="0" min="0" step="0.1"></div>
          <div class="calc-field"><label for="endSec">End (sec)</label><input type="number" id="endSec" value="10" min="0.1" step="0.1"></div>

<script type="module">
import { runFFmpeg } from '/assets/js/ffmpeg-loader.mjs';
  var file = null, blob = null, url = null;
  var preview = document.getElementById('preview');
  TS.setupDropZone(document.getElementById('dropZone'), document.getElementById('fileInput'), function (f) {
    file = f[0]; if (!file) return;
    if (url) URL.revokeObjectURL(url);
    url = URL.createObjectURL(file);
    preview.src = url;
    document.getElementById('controls').style.display = 'block';
    preview.onloadedmetadata = function () {
      document.getElementById('endSec').value = Math.min(30, preview.duration).toFixed(1);
      document.getElementById('endSec').max = preview.duration;
      document.getElementById('startSec').max = preview.duration;
    };
  }, { preview: false });
  document.getElementById('trimBtn').addEventListener('click', async function () {
    if (!file) return;
    var start = parseFloat(document.getElementById('startSec').value) || 0;
    var end = parseFloat(document.getElementById('endSec').value) || 0;
    if (end <= start) { alert('End must be after start.'); return; }
    var ext = (file.name.split('.').pop() || 'mp4').toLowerCase();
    var btn = document.getElementById('trimBtn'); btn.disabled = true;
  document.getElementById('progressBar').classList.add('active');
  document.getElementById('statusText').textContent = 'Loading engine…';
  try {
    var ext = (file.name.split('.').pop() || 'mp4').toLowerCase();
    var dur = (end - start).toFixed(2);
    blob = await runFFmpeg(file, 'input.' + ext, 'output.mp4', ['-ss', String(start), '-t', dur, '-c', 'copy'], function (p) {
      document.getElementById('progressFill').style.width = p + '%';
      document.getElementById('statusText').textContent = 'Trimming… ' + p + '%';
    });
    blob = new Blob([blob], { type: 'video/mp4' });
    document.getElementById('resultPanel').classList.add('active');
    document.getElementById('statusText').textContent = 'Clip ready · ' + TS.formatBytes(blob.size);
    if (window.TSAnalytics) TSAnalytics.track('tool_complete', { tool: 'video-trim' });
  } catch (e) {
    document.getElementById('statusText').textContent = 'Trim failed — try re-encode mode.';
    try {
      blob = await runFFmpeg(file, 'input.' + ext, 'output.mp4', ['-ss', String(start), '-t', String(end - start), '-c:v', 'libx264', '-c:a', 'aac'], function () {});
      blob = new Blob([blob], { type: 'video/mp4' });
      document.getElementById('resultPanel').classList.add('active');
    } catch (e2) { alert('Could not trim video.'); }
  }
  btn.disabled = false; document.getElementById('progressBar').classList.remove('active');
});
document.getElementById('downloadBtn').addEventListener('click', function () {
  if (blob) TS.downloadBlob(blob, 'trimmed-clip.mp4');
});
</script>
