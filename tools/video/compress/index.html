<script type="module">
import { runFFmpeg } from '/assets/js/ffmpeg-loader.mjs';
var file = null, blob = null, crf = '23';
document.getElementById('qualityRow').addEventListener('click', function (e) {
  var c = e.target.closest('[data-crf]'); if (!c) return;
  document.getElementById('qualityRow').querySelectorAll('.chip').forEach(function (x) { x.classList.remove('active'); });
  c.classList.add('active'); crf = c.dataset.crf;
});
TS.setupDropZone(document.getElementById('dropZone'), document.getElementById('fileInput'), function (f) {
  file = f[0]; if (!file) return;
  document.getElementById('fileInfo').textContent = file.name + ' · ' + TS.formatBytes(file.size);
  document.getElementById('compressBtn').style.display = 'block';
});
document.getElementById('compressBtn').addEventListener('click', async function () {
  if (!file) return;
  var btn = document.getElementById('compressBtn'); btn.disabled = true;
  var bar = document.getElementById('progressBar'), fill = document.getElementById('progressFill');
  var status = document.getElementById('statusText');
  bar.classList.add('active'); status.textContent = 'Loading video engine…';
  try {
    var ext = (file.name.split('.').pop() || 'mp4').toLowerCase();
    var inName = 'input.' + ext;
    blob = await runFFmpeg(file, inName, 'output.mp4', ['-c:v', 'libx264', '-crf', crf, '-preset', 'fast', '-c:a', 'aac', '-movflags', '+faststart'], function (p) {
      fill.style.width = p + '%'; status.textContent = 'Compressing… ' + p + '%';
    });
    blob = new Blob([blob], { type: 'video/mp4' });
    document.getElementById('resultPanel').classList.add('active');
    status.textContent = 'Done · ' + TS.formatBytes(blob.size) + ' (was ' + TS.formatBytes(file.size) + ')';
    if (window.TSAnalytics) TSAnalytics.track('tool_complete', { tool: 'video-compress' });
  } catch (e) { status.textContent = 'Compression failed. Try a shorter clip.'; console.error(e); }
  btn.disabled = false; bar.classList.remove('active');
});
document.getElementById('downloadBtn').addEventListener('click', function () {
  if (blob) TS.downloadBlob(blob, 'compressed-video.mp4');
});
</script>
