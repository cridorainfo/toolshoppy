<script type="module">
import { runFFmpeg } from '/assets/js/ffmpeg-loader.mjs';
var file = null, blob = null;
TS.setupDropZone(document.getElementById('dropZone'), document.getElementById('fileInput'), function (f) {
  file = f[0]; if (!file) return;
  document.getElementById('fileInfo').textContent = file.name + ' · ' + TS.formatBytes(file.size);
  document.getElementById('convertBtn').style.display = 'block';
});
document.getElementById('convertBtn').addEventListener('click', async function () {
  if (!file) return;
  var btn = document.getElementById('convertBtn'); btn.disabled = true;
  document.getElementById('progressBar').classList.add('active');
  document.getElementById('statusText').textContent = 'Loading engine…';
  var ext = (file.name.split('.').pop() || 'mp4').toLowerCase();
  try {
    blob = await runFFmpeg(file, 'input.' + ext, 'output.mp3', ['-vn', '-acodec', 'libmp3lame', '-q:a', '2'], function (p) {
      document.getElementById('progressFill').style.width = p + '%';
      document.getElementById('statusText').textContent = 'Extracting audio… ' + p + '%';
    });
    blob = new Blob([blob], { type: 'audio/mpeg' });
    document.getElementById('resultPanel').classList.add('active');
    document.getElementById('statusText').textContent = 'Done · ' + TS.formatBytes(blob.size);
    if (window.TSAnalytics) TSAnalytics.track('tool_complete', { tool: 'video-to-mp3' });
  } catch (e) {
    try {
      blob = await runFFmpeg(file, 'input.' + ext, 'output.m4a', ['-vn', '-acodec', 'aac'], function () {});
      blob = new Blob([blob], { type: 'audio/mp4' });
      document.getElementById('downloadBtn').textContent = 'Download M4A';
      document.getElementById('resultPanel').classList.add('active');
      document.getElementById('statusText').textContent = 'MP3 unavailable — saved as M4A';
    } catch (e2) { document.getElementById('statusText').textContent = 'Conversion failed.'; }
  }
  btn.disabled = false; document.getElementById('progressBar').classList.remove('active');
});
document.getElementById('downloadBtn').addEventListener('click', function () {
  if (!blob) return;
  var name = blob.type.indexOf('mpeg') >= 0 ? 'audio.mp3' : 'audio.m4a';
  TS.downloadBlob(blob, name);
});
</script>
