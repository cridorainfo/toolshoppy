<script>
(function () {
  var SIZES = [
    { label: 'Max (1280×720)', key: 'maxresdefault' },
    { label: 'High (480×360)', key: 'hqdefault' },
    { label: 'Medium (320×180)', key: 'mqdefault' },
    { label: 'Standard (120×90)', key: 'default' },
  ];
  function parseId(v) {
    v = (v || '').trim();
    if (/^[a-zA-Z0-9_-]{11}$/.test(v)) return v;
    var m = v.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }
  document.getElementById('fetchBtn').addEventListener('click', function () {
    var id = parseId(document.getElementById('ytUrl').value);
    if (!id) { alert('Paste a valid YouTube URL or 11-character video ID.'); return; }
    var box = document.getElementById('results');
    box.style.display = 'block';
    box.innerHTML = SIZES.map(function (s) {
      var url = 'https://img.youtube.com/vi/' + id + '/' + s.key + '.jpg';
      return '<div style="margin-bottom:16px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);"><div style="font-size:0.8rem;font-weight:700;color:var(--text-muted);margin-bottom:8px;">' + s.label + '</div><img src="' + url + '" alt="' + s.label + '" style="max-width:100%;border-radius:8px;" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'"><p style="display:none;font-size:0.85rem;color:var(--text-muted);">Not available for this video</p><a class="btn btn-accent" href="' + url + '" download="youtube-' + id + '-' + s.key + '.jpg" target="_blank" rel="noopener" style="margin-top:8px;display:inline-block;">Download</a></div>';

})();
