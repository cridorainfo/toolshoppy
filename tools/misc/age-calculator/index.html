<script>
(function () {
  var asOf = document.getElementById('asOf');
  asOf.value = new Date().toISOString().slice(0, 10);
  function diff(d1, d2) {
    var y = d2.getFullYear() - d1.getFullYear();
    var m = d2.getMonth() - d1.getMonth();
    var d = d2.getDate() - d1.getDate();
    if (d < 0) { m--; d += new Date(d2.getFullYear(), d2.getMonth(), 0).getDate(); }
    if (m < 0) { y--; m += 12; }
    return { y: y, m: m, d: d };
  }
  function run() {
    var dob = new Date(document.getElementById('dob').value);
    var end = new Date(asOf.value);
    if (isNaN(dob) || isNaN(end) || dob > end) { document.getElementById('ageValue').textContent = '—'; return; }
    var a = diff(dob, end);
    document.getElementById('ageValue').textContent = a.y + 'y ' + a.m + 'm ' + a.d + 'd';
    document.getElementById('totalDays').textContent = Math.floor((end - dob) / 86400000).toLocaleString('en-IN');
    var next = new Date(end.getFullYear(), dob.getMonth(), dob.getDate());
    if (next <= end) next.setFullYear(next.getFullYear() + 1);
    document.getElementById('nextBday').textContent = Math.ceil((next - end) / 86400000) + ' days';
  }
  document.getElementById('dob').addEventListener('change', run);
  asOf.addEventListener('change', run);
  run();
})();
</script>
