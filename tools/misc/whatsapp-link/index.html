<script>
(function () {
  var phone = document.getElementById('phone');
  var message = document.getElementById('message');
  var linkOut = document.getElementById('linkOut');
  var openBtn = document.getElementById('openBtn');
  function build() {
    var p = (phone.value || '').replace(/\D/g, '');
    var url = p ? 'https://wa.me/' + p : 'https://wa.me/';
    var msg = (message.value || '').trim();
    if (msg) url += '?text=' + encodeURIComponent(msg);
    linkOut.textContent = url;
    openBtn.href = url;
    return url;
  }
  phone.addEventListener('input', build);
  message.addEventListener('input', build);
  document.getElementById('copyBtn').addEventListener('click', function () {
    var url = build();
    navigator.clipboard.writeText(url).then(function () { alert('Link copied!'); }).catch(function () { prompt('Copy:', url); });
  });
  build();
})();
</script>
