<script>
(function () {
  var STYLES = {
    casual: { font: '22px "Segoe Script", "Bradley Hand", cursive', line: 34, jitter: 1.2 },
    neat: { font: '20px "Segoe Print", "Comic Sans MS", cursive', line: 32, jitter: 0.4 },
    cursive: { font: '24px "Brush Script MT", "Segoe Script", cursive', line: 36, jitter: 1.5 },
  };
  var style = 'casual', paper = '#fffef8';
  var canvas = document.getElementById('outCanvas'), ctx = canvas.getContext('2d');
  var input = document.getElementById('inputText');
  function render() {
    var cfg = STYLES[style], pad = 28, w = 600;
    var lines = input.value.replace(/\r/g, '').split('\n');
    var h = Math.max(200, pad * 2 + lines.length * cfg.line + 20);
    canvas.width = w; canvas.height = h;
    ctx.fillStyle = paper; ctx.fillRect(0, 0, w, h);
    if (paper === '#f0f7ff') {
      ctx.strokeStyle = 'rgba(100,160,220,0.35)'; ctx.lineWidth = 1;
      for (var y = pad + 10; y < h; y += cfg.line) { ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w - pad, y); ctx.stroke(); }
    }
    ctx.fillStyle = '#1a365d'; ctx.font = cfg.font; ctx.textBaseline = 'top';
    lines.forEach(function (line, li) {
      var x = pad, y = pad + li * cfg.line;
      for (var i = 0; i < line.length; i++) {
        var ch = line[i];
        var jx = (Math.random() - 0.5) * cfg.jitter * 2;
        var jy = (Math.random() - 0.5) * cfg.jitter;
        ctx.save(); ctx.translate(x + jx, y + jy); ctx.rotate((Math.random() - 0.5) * 0.04);
        ctx.fillText(ch, 0, 0); ctx.restore();
        x += ctx.measureText(ch).width + (Math.random() * 0.8);
      }
    });
  }
  document.getElementById('styleRow').addEventListener('click', function (e) {
    var c = e.target.closest('[data-style]'); if (!c) return;
    document.getElementById('styleRow').querySelectorAll('.chip').forEach(function (x) { x.classList.remove('active'); });
    c.classList.add('active'); style = c.dataset.style; render();
  });
  document.getElementById('paperRow').addEventListener('click', function (e) {
    var c = e.target.closest('[data-paper]'); if (!c) return;
    document.getElementById('paperRow').querySelectorAll('.chip').forEach(function (x) { x.classList.remove('active'); });
    c.classList.add('active'); paper = c.dataset.paper; canvas.style.background = paper; render();
  });
  input.addEventListener('input', render);
  document.getElementById('downloadBtn').addEventListener('click', function () {
    canvas.toBlob(function (b) { TS.downloadBlob(b, 'handwriting.png'); });
    if (window.TSAnalytics) TSAnalytics.track('tool_complete', { tool: 'text-handwriting' });
  });
  render();
})();
</script>
