<script>
(function () {
  var ZONES = [
    { id: 'Asia/Kolkata', label: 'India (IST)' },
    { id: 'Asia/Dubai', label: 'UAE / Dubai (GST)' },
    { id: 'Asia/Riyadh', label: 'Saudi Arabia' },
    { id: 'Asia/Kuwait', label: 'Kuwait' },
    { id: 'Europe/London', label: 'UK (GMT/BST)' },
    { id: 'America/New_York', label: 'US Eastern' },
    { id: 'America/Los_Angeles', label: 'US Pacific' },
    { id: 'Europe/Berlin', label: 'Central Europe' },
    { id: 'Asia/Singapore', label: 'Singapore' },
    { id: 'Australia/Sydney', label: 'Australia (Sydney)' },
    { id: 'UTC', label: 'UTC' },
  ];
  var fromTz = document.getElementById('fromTz'), toTz = document.getElementById('toTz');
  ZONES.forEach(function (z) {
    fromTz.innerHTML += '<option value="' + z.id + '">' + z.label + '</option>';
    toTz.innerHTML += '<option value="' + z.id + '">' + z.label + '</option>';
  });
  fromTz.value = 'Asia/Kolkata'; toTz.value = 'Asia/Dubai';
  function pad(n) { return String(n).padStart(2, '0'); }
  function toLocalInput(d) {
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function partsInZone(date, tz) {
    var f = new Intl.DateTimeFormat('en-GB', { timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
    var p = f.formatToParts(date);
    var g = function (t) { return p.find(function (x) { return x.type === t; }).value; };
    return { y: +g('year'), m: +g('month'), d: +g('day'), h: +g('hour'), min: +g('minute') };
  }
  function convert() {
    var raw = document.getElementById('dtInput').value;
    if (!raw) return;
    var local = new Date(raw);
    var src = partsInZone(local, fromTz.value);
    var utcGuess = Date.UTC(src.y, src.m - 1, src.d, src.h, src.min);
    var corrected = utcGuess - (partsInZone(new Date(utcGuess), fromTz.value).h - src.h) * 3600000;
    var result = new Date(corrected);
    var fmt = new Intl.DateTimeFormat('en-IN', { timeZone: toTz.value, weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
    document.getElementById('resultOut').textContent = fmt.format(result);
    var offFrom = -new Date().toLocaleString('en-US', { timeZone: fromTz.value }).length;
    document.getElementById('diffOut').textContent = fromTz.options[fromTz.selectedIndex].text + ' → ' + toTz.options[toTz.selectedIndex].text;
  }
  document.getElementById('dtInput').value = toLocalInput(new Date());
  ['fromTz', 'toTz', 'dtInput'].forEach(function (id) { document.getElementById(id).addEventListener('change', convert); document.getElementById(id).addEventListener('input', convert); });
  document.getElementById('nowBtn').addEventListener('click', function () { document.getElementById('dtInput').value = toLocalInput(new Date()); convert(); });
  convert();
})();
</script>
