<script>
(function () {
  var unit = 'metric';
  function category(b) {
    if (b < 18.5) return 'Underweight';
    if (b < 25) return 'Normal weight';
    if (b < 30) return 'Overweight';
    return 'Obese';
  }
  function run() {
    var bmi;
    if (unit === 'metric') {
      var kg = parseFloat(document.getElementById('weightKg').value) || 0;
      var cm = parseFloat(document.getElementById('heightCm').value) || 0;
      var m = cm / 100;
      bmi = m > 0 ? kg / (m * m) : 0;
    } else {
      var lb = parseFloat(document.getElementById('weightLb').value) || 0;
      var inches = (parseFloat(document.getElementById('heightFt').value) || 0) * 12 + (parseFloat(document.getElementById('heightIn').value) || 0);
      bmi = inches > 0 ? (703 * lb) / (inches * inches) : 0;
    }
    document.getElementById('bmiValue').textContent = bmi ? bmi.toFixed(1) : '—';
    document.getElementById('bmiCat').textContent = bmi ? category(bmi) : '—';
  }
  document.getElementById('unitRow').addEventListener('click', function (e) {
    var chip = e.target.closest('[data-unit]'); if (!chip) return;
    unit = chip.dataset.unit;
    document.getElementById('unitRow').querySelectorAll('.chip').forEach(function (c) { c.classList.remove('active'); });
    chip.classList.add('active');
    document.getElementById('metricForm').style.display = unit === 'metric' ? '' : 'none';
    document.getElementById('imperialForm').style.display = unit === 'imperial' ? '' : 'none';
    run();
  });
  ['weightKg','heightCm','weightLb','heightFt','heightIn'].forEach(function (id) { document.getElementById(id).addEventListener('input', run); });
  run();
})();
</script>
