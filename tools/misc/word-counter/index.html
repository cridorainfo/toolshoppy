<script>
(function () {
  var ta = document.getElementById('textIn');
  function run() {
    var t = ta.value;
    var words = t.trim() ? t.trim().split(/\s+/).length : 0;
    var sentences = t.trim() ? (t.match(/[.!?]+/g) || []).length || 1 : 0;
    document.getElementById('words').textContent = words;
    document.getElementById('chars').textContent = t.length;
    document.getElementById('charsNoSpace').textContent = t.replace(/\s/g, '').length;
    document.getElementById('sentences').textContent = sentences;
    document.getElementById('readTime').textContent = Math.max(1, Math.ceil(words / 200)) + ' min';
  }
  ta.addEventListener('input', run);
  run();
})();
</script>
