(function () {

    { name: 'Bold', map: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz', to: 'рқҗҖрқҗҒрқҗӮрқҗғрқҗ„рқҗ…рқҗҶрқҗҮрқҗҲрқҗүрқҗҠрқҗӢрқҗҢрқҗҚрқҗҺрқҗҸрқҗҗрқҗ‘рқҗ’рқҗ“рқҗ”рқҗ•рқҗ–рқҗ—рқҗҳрқҗҷрқҗҡрқҗӣрқҗңрқҗқрқҗһрқҗҹрқҗ рқҗЎрқҗўрқҗЈрқҗӨрқҗҘрқҗҰрқҗ§рқҗЁрқҗ©рқҗӘрқҗ«рқҗ¬рқҗӯрқҗ®рқҗҜрқҗ°рқҗұрқҗІрқҗі' },
    { name: 'Italic', map: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz', to: 'рқҗҙрқҗөрқҗ¶рқҗ·рқҗёрқҗ№рқҗәрқҗ»рқҗјрқҗҪрқҗҫрқҗҝрқ‘Җрқ‘Ғрқ‘Ӯрқ‘ғрқ‘„рқ‘…рқ‘Ҷрқ‘Үрқ‘Ҳрқ‘үрқ‘Ҡрқ‘Ӣрқ‘Ңрқ‘Қрқ‘Һрқ‘Ҹрқ‘җрқ‘‘рқ‘’рқ‘“рқ‘”в„Һрқ‘–рқ‘—рқ‘ҳрқ‘ҷрқ‘ҡрқ‘ӣрқ‘ңрқ‘қрқ‘һрқ‘ҹрқ‘ рқ‘Ўрқ‘ўрқ‘Јрқ‘Өрқ‘Ҙрқ‘Ұрқ‘§' },
    { name: 'Monospace', map: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789', to: 'рқҷ°рқҷұрқҷІрқҷірқҷҙрқҷөрқҷ¶рқҷ·рқҷёрқҷ№рқҷәрқҷ»рқҷјрқҷҪрқҷҫрқҷҝрқҡҖрқҡҒрқҡӮрқҡғрқҡ„рқҡ…рқҡҶрқҡҮрқҡҲрқҡүрқҡҠрқҡӢрқҡҢрқҡҚрқҡҺрқҡҸрқҡҗрқҡ‘рқҡ’рқҡ“рқҡ”рқҡ•рқҡ–рқҡ—рқҡҳрқҡҷрқҡҡрқҡӣрқҡңрқҡқрқҡһрқҡҹрқҡ рқҡЎрқҡўрқҡЈрқҹ¶рқҹ·рқҹёрқҹ№рқҹәрқҹ»рқҹјрқҹҪрқҹҫрқҹҝ' },

    { name: 'Circled', map: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', to: 'в’¶в’·в’ёв’№в’әв’»в’јв’Ҫв’ҫв’ҝв“Җв“Ғв“Ӯв“ғв“„в“…в“Ҷв“Үв“Ҳв“үв“Ҡв“Ӣв“Ңв“Қв“Һв“Ҹ' },
    { name: 'Wide', map: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz ', to: 'пјЎпјўпјЈпјӨпјҘпјҰпј§пјЁпј©пјӘпј«пј¬пјӯпј®пјҜпј°пјұпјІпјіпјҙпјөпј¶пј·пјёпј№пјәпҪҒпҪӮпҪғпҪ„пҪ…пҪҶпҪҮпҪҲпҪүпҪҠпҪӢпҪҢпҪҚпҪҺпҪҸпҪҗпҪ‘пҪ’пҪ“пҪ”пҪ•пҪ–пҪ—пҪҳпҪҷпҪҡгҖҖ' },
  ];
  function transform(text, style) {
    var out = '';
    for (var i = 0; i < text.length; i++) {
      var ch = text[i];
      var idx = style.map.indexOf(ch);
      out += idx >= 0 ? style.to[idx] : ch;
    }
    return out;
  }
  var list = document.getElementById('stylesList');
  var input = document.getElementById('inputText');
  function render() {
    var text = input.value || '';
    list.innerHTML = STYLES.map(function (s) {
      var out = transform(text, s);
      return '<div style="margin-bottom:12px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);"><div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);margin-bottom:6px;">' + s.name + '</div><div class="fancy-output" style="min-height:auto;padding:0;background:none;border:none;">' + (out || 'вҖ”') + '</div><button type="button" class="btn" style="margin-top:8px;font-size:0.8rem;padding:6px 12px;background:var(--card);border:1px solid var(--border);" data-copy="' + out.replace(/"/g, '&quot;') + '">Copy</button></div>';
    }).join('');
    list.querySelectorAll('[data-copy]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        navigator.clipboard.writeText(btn.dataset.copy).then(function () { btn.textContent = 'Copied!'; setTimeout(function () { btn.textContent = 'Copy'; }, 1500); });
      });
    });
  }
  input.addEventListener('input', render);
  render();
})();
</script>
