<script>
(function () {
  var VAT = 0.05, mode = 'add';
  function fmt(n) { return 'AED ' + (Math.round(n * 100) / 100).toLocaleString('en-AE'); }
  function run() {
    var amt = parseFloat(document.getElementById('amount').value) || 0;
    var vat, total, net;
    if (mode === 'add') {
      vat = amt * VAT; total = amt + vat; net = amt;
      document.getElementById('amountLabel').textContent = 'Amount (excl. VAT) AED';
      document.getElementById('resultLabel').textContent = 'Total (incl. VAT)';
    } else {
      total = amt; net = amt / (1 + VAT); vat = total - net;
      document.getElementById('amountLabel').textContent = 'Amount (incl. VAT) AED';
      document.getElementById('resultLabel').textContent = 'Amount (excl. VAT)';
    }
    document.getElementById('total').textContent = fmt(mode === 'add' ? total : net);
    document.getElementById('vatAmt').textContent = fmt(vat);
    document.getElementById('netGross').textContent = fmt(net) + ' / ' + fmt(total);
  }
  document.getElementById('modeRow').addEventListener('click', function (e) {
    var c = e.target.closest('[data-mode]'); if (!c) return;
    document.getElementById('modeRow').querySelectorAll('.chip').forEach(function (x) { x.classList.remove('active'); });
    c.classList.add('active'); mode = c.dataset.mode; run();
  });
  document.getElementById('amount').addEventListener('input', run);
  run();
})();
</script>
