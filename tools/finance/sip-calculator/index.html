<script>
(function () {
  function fmt(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }
  function run() {
    var P = parseFloat(document.getElementById('monthly').value) || 0;
    var annual = parseFloat(document.getElementById('rate').value) || 0;
    var years = parseFloat(document.getElementById('years').value) || 0;
    var n = years * 12, r = annual / 12 / 100;
    var fv = r > 0 ? P * ((Math.pow(1 + r, n) - 1) / r) * (1 + r) : P * n;
    var invested = P * n;
    document.getElementById('maturity').textContent = fmt(fv);
    document.getElementById('invested').textContent = fmt(invested);
    document.getElementById('gained').textContent = fmt(fv - invested);
  }
  ['monthly', 'rate', 'years'].forEach(function (id) { document.getElementById(id).addEventListener('input', run); });
  run();
})();
</script>
