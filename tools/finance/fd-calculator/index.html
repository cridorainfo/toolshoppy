<script>
(function () {
  var type = 'fd';
  function fmt(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }
  function run() {
    var P = parseFloat(document.getElementById('principal').value) || 0;
    var annual = parseFloat(document.getElementById('rate').value) || 0;
    var years = parseFloat(document.getElementById('years').value) || 0;
    var maturity, deposited, interest;
    if (type === 'fd') {
      deposited = P;
      maturity = P * Math.pow(1 + annual / 400, 4 * years);
      interest = maturity - deposited;
    } else {
      var months = years * 12;
      deposited = P * months;
      interest = P * months * (months + 1) / 2 * (annual / 1200);
      maturity = deposited + interest;
    }
    document.getElementById('maturity').textContent = fmt(maturity);
    document.getElementById('deposited').textContent = fmt(deposited);
    document.getElementById('interest').textContent = fmt(interest);
  }
  document.getElementById('typeRow').addEventListener('click', function (e) {
    var c = e.target.closest('[data-type]'); if (!c) return;
    document.getElementById('typeRow').querySelectorAll('.chip').forEach(function (x) { x.classList.remove('active'); });
    c.classList.add('active'); type = c.dataset.type;
    document.getElementById('principalLabel').textContent = type === 'fd' ? 'Lump sum ₹' : 'Monthly deposit ₹';
    document.getElementById('principal').value = type === 'fd' ? 100000 : 5000;
    run();
  });
  ['principal', 'rate', 'years'].forEach(function (id) { document.getElementById(id).addEventListener('input', run); });
  run();
})();
</script>
