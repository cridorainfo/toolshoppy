<script>
(function () {
  var PRESETS = [
    { id: 'in', label: 'India', w: 350, h: 350, maxKb: 200, note: '2×2 inch, max 200KB' },
    { id: 'uae', label: 'UAE', w: 413, h: 531, maxKb: 300, note: '35×45mm, max 300KB' },
    { id: 'us', label: 'US', w: 600, h: 600, maxKb: 300, note: '2×2 inch, max 300KB' },
    { id: 'uk', label: 'UK', w: 413, h: 531, maxKb: 300, note: '35×45mm, max 300KB' },
  ];
  var active = PRESETS[0], bg = '#FFFFFF', file = null, blob = null;
  var presetRow = document.getElementById('presetRow'), presetInfo = document.getElementById('presetInfo');
  PRESETS.forEach(function (p, i) {
    var b = document.createElement('button'); b.className = 'chip' + (i ? '' : ' active'); b.textContent = p.label; b.type = 'button';
    b.addEventListener('click', function () { presetRow.querySelectorAll('.chip').forEach(function (c) { c.classList.remove('active'); }); b.classList.add('active'); active = p; presetInfo.textContent = p.note; });
    presetRow.appendChild(b);
  });
  presetInfo.textContent = active.note;
  var urlPreset = new URLSearchParams(location.search).get('preset');
  if (urlPreset) {
    PRESETS.forEach(function (p, i) {
      if (p.id === urlPreset && presetRow.children[i]) presetRow.children[i].click();
    });
  }
  document.getElementById('bgRow').addEventListener('click', function (e) {
    var c = e.target.closest('.chip'); if (!c) return;
    document.getElementById('bgRow').querySelectorAll('.chip').forEach(function (x) { x.classList.remove('active'); });
    c.classList.add('active'); bg = c.dataset.bg;
  });
  TS.setupDropZone(document.getElementById('dropZone'), document.getElementById('fileInput'), function (f) { file = f[0]; if (file) document.getElementById('controls').style.display = 'block'; });
  document.getElementById('generateBtn').addEventListener('click', async function () {
    if (!file) return;
    var btn = document.getElementById('generateBtn'); btn.disabled = true;
    document.getElementById('progressBar').classList.add('active');
    try {
      var loaded = await TS.loadImage(file);
      var canvas = TSImage.passportCanvas(loaded.img, active, bg);
      blob = await TS.canvasToTargetSize(canvas, active.maxKb * 1024, 'image/jpeg');
      document.getElementById('outDims').textContent = active.w + '×' + active.h;
      document.getElementById('outFileSize').textContent = TS.formatBytes(blob.size);
      document.getElementById('previewImg').src = URL.createObjectURL(blob);
      document.getElementById('resultPanel').classList.add('active');
      if (window.TSAnalytics) TSAnalytics.track('tool_complete', { tool: 'passport-photo' });
    } catch (e) { alert('Failed to generate photo.'); }
    btn.disabled = false; document.getElementById('progressBar').classList.remove('active');
  });
  document.getElementById('downloadBtn').addEventListener('click', function () {
    if (blob) TS.downloadBlob(blob, 'passport-photo-' + active.id + '.jpg');
  });
})();
</script>
