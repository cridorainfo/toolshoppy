<script>
(function () {
  var file = null, blob = null, ext = 'webp';
  TS.setupDropZone(document.getElementById('dropZone'), document.getElementById('fileInput'), function (f) { file = f[0]; if (file) document.getElementById('controls').style.display = 'block'; });
  document.getElementById('makeBtn').addEventListener('click', async function () {
    if (!file) return;
    var btn = document.getElementById('makeBtn'); btn.disabled = true;
    document.getElementById('progressBar').classList.add('active');
    try {
      var loaded = await TS.loadImage(file);
      blob = await TSImage.makeSticker(loaded.img, 512, 100 * 1024);
      ext = blob.type.indexOf('webp') >= 0 ? 'webp' : 'png';
      document.getElementById('previewImg').src = URL.createObjectURL(blob);
      document.getElementById('sizeInfo').textContent = '512×512 · ' + TS.formatBytes(blob.size);
      document.getElementById('resultPanel').classList.add('active');
      if (window.TSAnalytics) TSAnalytics.track('tool_complete', { tool: 'sticker-maker' });
    } catch (e) { alert('Could not create sticker.'); }
    btn.disabled = false; document.getElementById('progressBar').classList.remove('active');
  });
  document.getElementById('downloadBtn').addEventListener('click', function () {
    if (blob) TS.downloadBlob(blob, 'whatsapp-sticker.' + ext);
  });
})();
</script>
